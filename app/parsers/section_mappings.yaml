# Section overrides for sheets where the heuristic section detector fails.
# Each entry: section name + inclusive code range [start, end].
# Only listed sheets get overridden — others (Parc Mobile, Mobile Money) keep
# their heuristic detection which works correctly today.
#
# Edit this file when next month's TBG file adds rows that fall outside a range
# — run `python -m app.parsers.section_mappings_validate` to see flagged codes.


services:
  tbg-copilot:
    build: .
    image: tbg-copilot:latest
    container_name: tbg-copilot
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: local Ollama service (GPU-accelerated)
  # Start with: docker compose --profile local-llm up
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_models:
